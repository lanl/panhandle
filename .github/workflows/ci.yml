name: packaging

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      #matrix:
      #  os_image: [ 'almalinux:8', 'almalinux:9', 'registry.suse.com/suse/sle15:15.5' ]
      matrix:
        include:
          - os_image: 'almalinux:8'
            arch: 'x86_64'
            runs_on: 'ubuntu-latest'
          - os_image: 'almalinux:8'
            arch: 'aarch64'
            runs_on: 'ubuntu-latest-arm'
          - os_image: 'almalinux:9'
            arch: 'x86_64'
            runs_on: 'ubuntu-latest'
          - os_image: 'registry.suse.com/suse/sle15:15.5'
            arch: 'x86_64'
            runs_on: 'ubuntu-latest'
        architecture: ['x86_64'] #['x86_64', 'aarch64']
        package: ["panhandle"]

    container:
      image: ${{ matrix.os_image }}

    steps:
      - name: Install Base Tools (Container)
        run: |
          if command -v dnf &> /dev/null; then
              dnf install -y gcc openssl-devel pkgconf-pkg-config binutils
          fi
          if command -v zypper &> /dev/null; then
              zypper install -y gcc gcc7 libopenssl-3-devel pkg-config
          fi

      - uses: actions/checkout@v6

      - name: Get package version
        id: get_version
        run: |
          VERSION=$(grep '^version' panhandle/panhandle/Cargo.toml | sed 's/version = //; s/"//g')
          RELEASE=$(grep '^release' panhandle/panhandle/Cargo.toml | sed 's/release = //; s/"//g')
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "PACKAGE_RELEASE=$RELEASE" >> $GITHUB_ENV
          #echo "$PACKAGE_VERSION-$PACKAGE_RELEASE"
        #shell: bash

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo '/root/.cargo/bin' >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustup toolchain install nightly --component rust-src
          rustup target add ${{ matrix.architecture }}-unknown-linux-gnu
          cargo install cargo-generate-rpm bpf-linker

      - name: Build Binary & Generate RPM
        run: |
          source "$HOME/.cargo/env"
          cd ${{ matrix.package }}
          export CARGO_TARGET_DIR="$PWD/target/${{ matrix.architecture }}-unknown-linux-gnu"
          cargo build --target ${{ matrix.architecture }}-unknown-linux-gnu --bin ${{ matrix.package }} --release --all-features
          echo $CARGO_TARGET_DIR
          ls -al $CARGO_TARGET_DIR/${{ matrix.architecture }}-unknown-linux-gnu/release/panhandle
          strip -s $CARGO_TARGET_DIR/${{ matrix.architecture }}-unknown-linux-gnu/release/panhandle
          cargo generate-rpm --package ${{ matrix.package }} --target ${{ matrix.architecture }}-unknown-linux-gnu --output ../rpmbuild/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}-${{ env.PACKAGE_VERSION }}-${{ env.PACKAGE_RELEASE }}.${{ matrix.architecture }}.rpm
          path: rpmbuild/
